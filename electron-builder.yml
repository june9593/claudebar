appId: com.clawbar.app
productName: ClawBar
copyright: Copyright © 2026

mac:
  category: public.app-category.productivity
  target:
    - target: dmg
      arch:
        - arm64
        - x64
  icon: resources/icon.png
  darkModeSupport: true

dmg:
  title: ClawBar
  iconSize: 80
  contents:
    - x: 130
      y: 220
    - x: 410
      y: 220
      type: link
      path: /Applications

directories:
  output: release-artifacts

files:
  - dist/**/*
  - dist-electron/**/*
  - resources/**/*
  - "!node_modules/**/*"

asar: true
compression: maximum
npmRebuild: false
electronLanguages:
  - en
  - zh_CN
