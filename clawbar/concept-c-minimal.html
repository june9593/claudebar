<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>clawbar — Concept C (Minimal Quick Chat)</title>
  <style>
    :root{
      --bg:#0b0d12;
      --card: rgba(255,255,255,.06);
      --stroke: rgba(255,255,255,.12);
      --text:#eaf0ff;
      --muted: rgba(234,240,255,.70);
      --a:#7c5cff; --b:#20d3ff; --ok:#3ef0a8; --warn:#ffcc66;
      --shadow: 0 18px 60px rgba(0,0,0,.55);
      --r: 18px;
      color-scheme: dark;
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, "Apple Color Emoji", "Segoe UI Emoji";
    }
    @media (prefers-color-scheme: light){
      :root{--bg:#f7f8fc; --card: rgba(14,20,40,.05); --stroke: rgba(14,20,40,.12); --text:#0b1030; --muted: rgba(11,16,48,.70); --shadow: 0 18px 60px rgba(15,18,40,.14); color-scheme: light;}
    }
    html,body{height:100%;}
    body{
      margin:0;
      background:
        radial-gradient(900px 520px at 20% 18%, rgba(124,92,255,.26), transparent 60%),
        radial-gradient(860px 520px at 82% 20%, rgba(32,211,255,.21), transparent 60%),
        linear-gradient(160deg, #070910, var(--bg));
      display:grid;
      place-items:center;
      padding:26px;
    }

    .popover{
      width: 360px;
      max-width: 92vw;
      border-radius: 22px;
      border:1px solid var(--stroke);
      background: linear-gradient(180deg, rgba(255,255,255,.08), rgba(255,255,255,.03));
      box-shadow: var(--shadow);
      overflow:hidden;
    }

    .head{padding:12px 12px 10px; display:flex; align-items:center; justify-content:space-between; gap:10px; border-bottom:1px solid rgba(255,255,255,.08)}
    .brand{display:flex; align-items:center; gap:10px}
    .dot{width:12px;height:12px;border-radius:50%; background:linear-gradient(135deg,var(--a),var(--b)); box-shadow:0 0 0 6px rgba(124,92,255,.12)}
    .brand b{font-size:13px}
    .brand span{display:block; font-size:11.5px; color:var(--muted); margin-top:2px}

    .chips{display:flex; gap:8px; flex-wrap:wrap; justify-content:flex-end}
    .chip{font-size:11px; padding:6px 8px; border-radius:999px; border:1px solid rgba(255,255,255,.12); background: rgba(255,255,255,.05); color: var(--muted)}
    .chip.ok{color:rgba(62,240,168,.92); border-color: rgba(62,240,168,.22); background: rgba(62,240,168,.08)}

    .body{padding:12px}

    .preview{
      border:1px solid rgba(255,255,255,.10);
      background: rgba(0,0,0,.14);
      border-radius: 18px;
      padding:10px;
      min-height:120px;
      display:flex; flex-direction:column; gap:8px;
    }
    .line{height:10px; border-radius:999px; background: rgba(255,255,255,.08)}
    .line.w1{width:86%}
    .line.w2{width:68%}
    .line.w3{width:56%}
    .bubble{margin-top:6px; width:72%; padding:10px 11px; border-radius:16px; border:1px solid rgba(255,255,255,.10); background: rgba(255,255,255,.05); font-size:12.5px; color: rgba(234,240,255,.88); line-height:1.38}

    .composer{margin-top:10px; display:flex; gap:10px; align-items:flex-end}
    .input{flex:1; border:1px solid rgba(255,255,255,.12); background: rgba(255,255,255,.06); border-radius: 16px; padding:10px 10px; font-size:12.5px; color:var(--text); min-height: 42px}
    .send{border:1px solid rgba(255,255,255,.14); background: linear-gradient(135deg, rgba(124,92,255,.62), rgba(32,211,255,.20)); border-radius: 16px; padding:11px 12px; font-size:12.5px; color: rgba(234,240,255,.92)}

    .actions{margin-top:10px; display:flex; gap:8px; flex-wrap:wrap}
    .a{font-size:11.5px; padding:8px 10px; border-radius:999px; border:1px solid rgba(255,255,255,.12); background: rgba(255,255,255,.05); color: rgba(234,240,255,.86)}

    .foot{margin-top:10px; color:var(--muted); font-size:11.5px; display:flex; justify-content:space-between; gap:10px; flex-wrap:wrap}
    a{color:inherit}
  </style>
</head>
<body>
  <div class="popover" role="application" aria-label="Minimal popover mockup">
    <div class="head">
      <div class="brand">
        <div class="dot" aria-hidden="true"></div>
        <div>
          <b>OpenClaw</b>
          <span>Quick chat</span>
        </div>
      </div>
      <div class="chips">
        <div class="chip ok">● Online</div>
        <div class="chip">⌘↩</div>
      </div>
    </div>

    <div class="body">
      <div class="preview">
        <div class="line w1"></div>
        <div class="line w2"></div>
        <div class="bubble">Ask me to run a job, check cron, or just talk. Keep it quick.</div>
      </div>

      <div class="composer">
        <div class="input" contenteditable="true" role="textbox" aria-label="Message">Message…</div>
        <button class="send">Send</button>
      </div>

      <div class="actions" aria-label="Quick actions">
        <div class="a">Cron</div>
        <div class="a">Sessions</div>
        <div class="a">Restart</div>
        <div class="a">Wake</div>
      </div>

      <div class="foot">
        <div>Compact popover optimized for speed.</div>
        <div><a href="index.html">← Back</a></div>
      </div>
    </div>
  </div>
</body>
</html>
