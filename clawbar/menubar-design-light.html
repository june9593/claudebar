<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenClaw Menu Bar - Light Theme</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-image: url('https://images.unsplash.com/photo-1506744626753-eda8151a7474?q=80&w=2000&auto=format&fit=crop');
            background-size: cover;
            background-position: center;
            height: 100vh;
            display: flex;
            align-items: flex-start;
            justify-content: center;
            padding-top: 2rem;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        .menubar-panel {
            width: 350px;
            height: 600px;
            background: rgba(255, 255, 255, 0.65);
            backdrop-filter: blur(40px) saturate(150%);
            -webkit-backdrop-filter: blur(40px) saturate(150%);
            border: 1px solid rgba(255, 255, 255, 0.5);
            border-radius: 16px;
            box-shadow: 0 10px 40px -10px rgba(0,0,0,0.2), 0 0 0 1px rgba(0,0,0,0.05);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Subtle scrollbar */
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(0, 0, 0, 0.15); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(0, 0, 0, 0.25); }
    </style>
</head>
<body class="antialiased text-gray-800">

    <div class="menubar-panel">
        <!-- Header -->
        <div class="h-11 border-b border-gray-200/50 flex items-center justify-between px-3 shrink-0">
            <div class="flex items-center space-x-2">
                <div class="w-2.5 h-2.5 bg-green-500 rounded-full shadow-[0_0_4px_rgba(34,197,94,0.6)]"></div>
                <span class="font-semibold text-[13px] text-gray-800 tracking-tight">OpenClaw</span>
            </div>
            <div class="flex items-center space-x-2">
                <span class="text-[10px] font-medium bg-black/5 text-gray-500 px-1.5 py-0.5 rounded-md">Local Node</span>
                <button class="p-1 hover:bg-black/5 rounded-md transition-colors text-gray-500">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
                </button>
            </div>
        </div>

        <!-- Chat Area -->
        <div class="flex-1 overflow-y-auto p-3 space-y-4 text-[13px] flex flex-col">
            
            <div class="text-center text-[10px] text-gray-400 font-medium my-1">Today 16:02</div>

            <!-- User Message -->
            <div class="self-end max-w-[80%]">
                <div class="bg-blue-500 text-white rounded-2xl rounded-tr-sm px-3.5 py-2 shadow-sm">
                    <p>帮我检查一下桌面上那个 report.pdf 里有没有提到 Q3 的营收目标。</p>
                </div>
            </div>

            <!-- AI Message -->
            <div class="self-start max-w-[90%] flex space-x-2">
                <div class="w-6 h-6 rounded-full bg-gradient-to-br from-purple-500 to-blue-500 flex items-center justify-center shrink-0 mt-0.5 shadow-sm">
                    <svg class="w-3.5 h-3.5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
                </div>
                <div class="bg-white/80 border border-gray-100 rounded-2xl rounded-tl-sm px-3.5 py-2 shadow-sm">
                    <p class="leading-relaxed mb-2 text-gray-700">我查阅了 <code>~/Desktop/report.pdf</code>。文档在第 4 页提到了 Q3 的目标：</p>
                    <blockquote class="border-l-2 border-blue-400 pl-2 text-gray-500 text-xs my-2 italic">
                        "For Q3, the revenue target is set to $4.5 million, representing a 15% year-over-year growth."
                    </blockquote>
                    <p class="text-gray-700">目标是 <strong>450万美元</strong>，同比增长 15%。需要我帮你把这段摘要发送到 Slack 吗？</p>
                </div>
            </div>

            <!-- Status Message -->
            <div class="self-center flex items-center justify-center space-x-1.5 bg-black/5 px-2.5 py-1 rounded-md text-[11px] text-gray-500 mb-2">
                <svg class="w-3 h-3 animate-spin" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>
                <span>Searching local files...</span>
            </div>
            
        </div>

        <!-- Input Area -->
        <div class="p-3 bg-white/40 border-t border-gray-200/50 shrink-0">
            <div class="relative bg-white border border-gray-200 rounded-xl focus-within:border-blue-400 focus-within:ring-2 focus-within:ring-blue-100 transition-all flex items-end px-2 py-1.5 shadow-sm">
                <button class="p-1.5 text-gray-400 hover:text-gray-600 transition-colors shrink-0 rounded-lg">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.172 7l-6.586 6.586a2 2 0 102.828 2.828l6.414-6.586a4 4 0 00-5.656-5.656l-6.415 6.585a6 6 0 108.486 8.486L20.5 13"></path></svg>
                </button>
                <textarea rows="1" class="w-full bg-transparent text-[13px] text-gray-800 placeholder-gray-400 focus:outline-none resize-none max-h-24 overflow-y-auto leading-relaxed py-1 px-1" placeholder="Message OpenClaw..."></textarea>
                <button class="p-1.5 ml-1 bg-blue-500 text-white rounded-lg hover:bg-blue-600 transition-colors shrink-0 shadow-sm">
                    <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M5 10l7-7m0 0l7 7m-7-7v18"></path></svg>
                </button>
            </div>
        </div>
    </div>
</body>
</html>
